<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="layout.css" />
    <script src="js/productlist.js" defer></script>
    <title>productlist</title>
  </head>
  <body>
    <!-- Tilføj 4 knapper til filtrering-->
    <div id="filter">
      <button>All</button>
      <button>Unisex</button>
      <button>Men</button>
      <button>Women</button>
    </div>

    <!-- Tilføj knapper til sortering-->
    <div id="sorter">
      <button data-price="up">Lav-Høj</button>
      <button data-price="down">Høj-Lav</button>
      <button data-text="az">A-Z</button>
      <button data-text="za">Z-A</button>
    </div>

    <h1>T-SHIRTS</h1>
    <a href="index.html" class="back">Back</a>

    <!-- Normal produkt -->
    <section class="galleri">
      <article>
        <a href="product.html" class="product_card">
          <img src="image/dame.webp" alt="Sort T-shirt" />
          <h3>Sort T-shirt</h3>
          <p class="price">299 kr.</p>
        </a>
      </article>

      <article>
        <!-- Produkt med rabat -->
        <a href="product.html" class="product_card_sale">
          <img src="image/mand.webp" alt="Grå T-shirt" />
          <h3>Grå T-shirt</h3>
          <p class="old_price">599 kr.</p>
          <p class="price">399 kr.</p>
        </a>
      </article>
      <article>
        <!-- Udsolgt produkt -->
        <a href="product.html" class="product_card_sold_out">
          <img src="image/taske.webp" alt="Taske" />
          <h3>Taske</h3>
          <p class="price">999 kr.</p>
          <span class="sold_label">Udsolgt</span>
        </a>
      </article>

      <article>
        <!-- Normal produkt -->
        <a href="product.html" class="product_card">
          <img src="image/troje.webp" alt="Trøje" />
          <h3>Trøje</h3>
          <p class="price">599 kr.</p>
        </a>
      </article>

      <!--denne section er a sat udenom article. har taget billede af allans site. tjel om det skal laves om til hans.-->
      <a href="product.html">
        <article>
          <a href="product.html" class="product_card_sale">
            <img src="image/troje.webp" alt="T-shirt" />
            <h3>Cap</h3>
            <p class="old_price">199 kr.</p>
            <p class="price">99 kr.</p>
            <p class="procent">50% Off</p>
            <span class="sold_label">Udsolgt</span>
          </a>
        </article>
      </a>
    </section>
  </body>
</html>
